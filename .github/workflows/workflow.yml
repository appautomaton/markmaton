name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish built artifacts"
        required: true
        default: none
        type: choice
        options:
          - none
          - testpypi
          - pipy

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python3 -m pip install --upgrade pip build hatchling packaging

      - name: Build sdist
        run: python3 -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    name: build-wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: markmaton-engine
            wheel_tag: py3-none-manylinux2014_x86_64
          - os: macos-15-intel
            binary_name: markmaton-engine
            wheel_tag: py3-none-macosx_12_0_x86_64
            macos_deployment_target: "12.0"
          - os: macos-14
            binary_name: markmaton-engine
            wheel_tag: py3-none-macosx_12_0_arm64
            macos_deployment_target: "12.0"
          - os: windows-latest
            binary_name: markmaton-engine.exe
            wheel_tag: py3-none-win_amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag version matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          expected="${GITHUB_REF_NAME#v}"
          actual="$(python3 - <<'PY'
          import pathlib, tomllib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )"
          if [ "$actual" != "$expected" ]; then
            echo "Tag version $expected does not match pyproject version $actual" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: python3 -m pip install --upgrade pip build hatchling packaging

      - name: Build platform engine binary
        shell: bash
        env:
          CGO_ENABLED: "0"
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
        run: |
          mkdir -p .wheel-bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            go build -o ".wheel-bin/${{ matrix.binary_name }}" ./cmd/markmaton-engine
          else
            go build -o ".wheel-bin/${{ matrix.binary_name }}" ./cmd/markmaton-engine
            chmod +x ".wheel-bin/${{ matrix.binary_name }}"
          fi

      - name: Build wheel
        env:
          MARKMATON_ENGINE: ${{ github.workspace }}/.wheel-bin/${{ matrix.binary_name }}
          MARKMATON_WHEEL_TAG: ${{ matrix.wheel_tag }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
        run: python3 -m build --wheel --no-isolation

      - name: Smoke installed wheel
        shell: bash
        run: |
          python3 -m venv .wheel-smoke
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./.wheel-smoke/Scripts/pip install dist/*.whl
            ./.wheel-smoke/Scripts/python tests/smoke/installed_cli_smoke.py
          else
            ./.wheel-smoke/bin/pip install dist/*.whl
            ./.wheel-smoke/bin/python tests/smoke/installed_cli_smoke.py
          fi

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi'
    needs:
      - build-sdist
      - build-wheels
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        shell: bash
        run: |
          mkdir -p publish-dist
          find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} publish-dist/ \;

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: publish-dist

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_target == 'pipy')
    needs:
      - build-sdist
      - build-wheels
    runs-on: ubuntu-latest
    environment: pipy
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        shell: bash
        run: |
          mkdir -p publish-dist
          find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} publish-dist/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish-dist
