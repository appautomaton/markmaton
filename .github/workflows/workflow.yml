name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish built artifacts"
        required: true
        default: none
        type: choice
        options:
          - none
          - testpypi
          - pipy

permissions:
  contents: read

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python3 -m pip install --upgrade pip build hatchling packaging

      - name: Build sdist
        run: python3 -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    name: build-wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: markmaton-engine
          - os: macos-13
            binary_name: markmaton-engine
          - os: macos-14
            binary_name: markmaton-engine
          - os: windows-latest
            binary_name: markmaton-engine.exe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: python3 -m pip install --upgrade pip build hatchling packaging cibuildwheel

      - name: Build platform engine binary
        shell: bash
        run: |
          mkdir -p .wheel-bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            export CGO_ENABLED=0
            go build -o ".wheel-bin/${{ matrix.binary_name }}" ./cmd/markmaton-engine
          else
            CGO_ENABLED=0 go build -o ".wheel-bin/${{ matrix.binary_name }}" ./cmd/markmaton-engine
            chmod +x ".wheel-bin/${{ matrix.binary_name }}"
          fi

      - name: Build wheel
        env:
          MARKMATON_ENGINE: ${{ github.workspace }}/.wheel-bin/${{ matrix.binary_name }}
          CIBW_BUILD: cp312-*
          CIBW_SKIP: pp* *-musllinux_* *-win32
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_TEST_COMMAND: python {project}/tests/smoke/installed_cli_smoke.py
        run: python3 -m cibuildwheel --output-dir dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi'
    needs:
      - build-sdist
      - build-wheels
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        shell: bash
        run: |
          mkdir -p publish-dist
          find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} publish-dist/ \;

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: publish-dist

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_target == 'pipy')
    needs:
      - build-sdist
      - build-wheels
    runs-on: ubuntu-latest
    environment: pipy
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        shell: bash
        run: |
          mkdir -p publish-dist
          find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} publish-dist/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish-dist
